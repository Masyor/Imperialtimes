                content: `While normally, dear and pious readers, we would relegate stories concerning entertainment, up to and including Operas both holo and vox variations, towards our dedicated entertainment articles, a new Opera piece has caused such a shake up down here on Terra that we felt it appropriate to bring it your wider attention.

Named "Donna Ferrovia", the play follows the scandalous, hedonistic, and outright heretical actions of the Donna Ferrovia of the planet Edeonii. Although presented at every turn with offers of repentance for her crimes against her people and her fellow nobility, she continues to terrorize and inflict pain on her subjects with the help of her peasant-turned-seneschal Kortessio, who secretly resents his lack of freedom and consistently petitions a statue of the God-Emperor, ever silent to the masses, for justice. Eventually, on the way to her banquet in which she plans to commit 10000 misdeeds and 'ascend', she is stopped by the same statue, warning her of eternal pain incomprehensible to the mortal mind. She continues on, and at the climax of her banquet, after rebuking her lovers petition to repent one final time, she is stopped and dragged into the darkness by the statue of the God-Emperor, her screams echoing on and on for eternity. Eventually, the rest of the cast, peasant and noble, free from her reign, give thanks and offerings to the God-Emperor and his Imperium before planning for happier days.

While most Operas, especially amongst the thousand performed here on the throne world, are known for their exclusive noble clientele as well as consistently pious overtones, 'Donna Ferrovia' has broken through into the wider populace as well, quite possibility due to the supposed intervention of the Opera's composer, who has remained anonymous so far. Indeed, the simplistic means of production as well as more bitter and grim take has seemed to reach into the popular hearts of the masses, as select riots and unrest have been noted at locations where the Opera was either banned or unable to accommodate enough visitors. 

An official stance on the Opera's legality has yet to come, but many are skeptical in its continued legality after harsh denouncements were made from the noted Opera-hating Cardinal Gerroff Yspilotrokus, who has been quoted describing the Opera as "A despicable and infernal design, made for nothing short of the utter scum amidst the greater scum". Invesigations have been rumored to been conducted in order to locate the composer, who was also rumored to have left Terra in order to spread his work to the rest of the Segmentum. 

Time will tell if this tale of debauchery and grim justice will survive, but either way, we know you ever-so pious readers will keep watch and ensure the continued prosperity of our beloved Imperium. The God-Emperor Prevails.`

        function renderNewspaper() {
        const container = document.getElementById('main-content');
        container.innerHTML = '';

        issueData.forEach(story => {
            const article = document.createElement('article');
            
            // USE THE VARIABLE: If rowSpan exists, use it. Otherwise, default to 1.
            const spanClass = story.rowSpan ? `span-v-${story.rowSpan}` : '';
            article.className = `story ${story.type} ${spanClass}`;

            const len = story.title.length;
            let hSize;
            if (story.type === 'feature') hSize = len > 25 ? '38px' : '52px';
            else if (story.type === 'mid') hSize = len > 20 ? '28px' : '38px';
            else hSize = '24px';

            const paragraphs = story.content.split(/\n+/).filter(p => p.trim() !== '');
            const formattedContent = paragraphs.map(p => `<p>${p.trim()}</p>`).join('');

            article.innerHTML = `
                <h2 style="font-size: ${hSize}">${story.title}</h2>
                <span class="byline">From: ${story.author}</span>
                <div class="content">
                    ${story.image ? `<figure class="article-image"><img src="${story.image}"></figure>` : ''}
                    ${formattedContent}
                </div>
            `;
            container.appendChild(article);
        });

        applyOrkJitter();
    }

        function applyOrkJitter() {
            document.querySelectorAll('.ork-writing').forEach(block => {
                const words = block.innerText.split(/\s+/);
                block.innerHTML = words.map(word => {
                    const rot = (Math.random() * 6 - 3).toFixed(2);
                    return `<span style="display:inline-block; transform:rotate(${rot}deg); margin-right:5px;">${word}</span>`;
                }).join('');
            });
        }

        function downloadNewspaper() {
            const btn = document.getElementById('download-btn');
            const paper = document.querySelector('.parchment');
            btn.style.display = 'none';

            html2canvas(paper, {
                backgroundColor: "#080808",
                scale: 2,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Imperial-Times.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                btn.style.display = 'block';
            });
        }

        window.onload = renderNewspaper;
